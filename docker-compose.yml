services:
  db:
    image: postgres:16
    container_name: url-shortener-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: url-shortener-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "host=db port=5432 user=app password=password dbname=url_shortener sslmode=disable"
    depends_on:
      - db

volumes:
  pgdata:
